version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: iabs
      POSTGRES_PASSWORD: password
      POSTGRES_DB: arundacore
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iabs -d arundacore"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: "postgresql://iabs:password@db:5432/arundacore?schema=public"
      JWT_SECRET: "super-secret-key"
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npx prisma db push --accept-data-loss && npx tsx prisma/setup.ts && npx tsx server/app.ts"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  db_data:
