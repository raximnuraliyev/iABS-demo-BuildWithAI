services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: iabs
      POSTGRES_PASSWORD: password
      POSTGRES_DB: arundacore
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iabs -d arundacore"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: "postgresql://iabs:password@db:5432/arundacore?schema=public"
      JWT_SECRET: "iabs-sqb-uchet-arenda-jwt-secret-2026-buildwithai"
      CSRF_SECRET: "iabs-sqb-csrf-protection-secret-2026"
      CORS_ORIGIN: "http://localhost:8080"
      GOOGLE_AI_API_KEY: "${GOOGLE_AI_API_KEY}"
      COMET_API_KEY: "${COMET_API_KEY}"
      GCP_PROJECT_ID: "iabs-demo"
      PORT: 3001
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npx prisma db push --accept-data-loss && npx tsx prisma/seed.ts && npx tsx server/app.ts"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  db_data:
